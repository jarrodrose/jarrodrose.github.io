# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
timezone: Australia/Melbourne
title: 'JarrodRose [dot] Com'
email: jarrod@jarrodrose.com
#phone: +61 438 384 884
description: > # this means to ignore newlines until "baseurl:"
    Welcome to my website.
    It contains nothing of import.
    It is not a complex design.
    It is just a repository for information.
    Sounds a little like myself actually.
    Except the part about information.
    The site should have at least some useful information.
    Whereas I only contain interesting, but useless information.
baseurl: "" # the subpath of your site, e.g. /blog
url: "http://www.jarrodrose.com" # the base hostname & protocol for your site
twitter_username: jarrodrose
ello_username: jarrodrose
instagram_username: jarrodrose
#github_username: jarrodrose

## SOCIAL MEDIA CONNECTIONS
twitter_cards: yes
default_twitter_image: /assets/site/images/default-twitter-image.jpg

# Build settings
markdown: kramdown
sass:
  style: compressed
redirects: yes
exclude:
- deploy-dreamhost.sh
- jarrodrose-com.sublime*